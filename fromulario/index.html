<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title> Meu Formulario </title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
   <div class="container">
    <h1 class="title">Criar Conta</h1>
       <form action="">
        <div class="nome">
            <label for="nome-usuario">Usuario</label>
            <input  placeholder="Digite seu usuario aqui"   type="text" name="usuario" id="nome-usuario">
        </div>
        
        <div class="senha">
            <label for="senha-usuario">Senha</label>
            <input placeholder="Digite Sua Senha aqui" type="password" name="senha" id="senha-usuario">
        </div>

        <div>
            <label for="fps">FPS</label>
            <select name="fps" id="fps">
                <option>10</option>
                <option>20</option>
                <option>30</option>
                <option>40</option>
                <option>50</option>
                <option>60</option>
            </select>
            <input type="checkbox" name="termos" id="termo" required>
            <span class="aceita-termos"></span>
            Eu aceito os <a href="https://policies.google.com/terms?hl=pt-BR" class="link">termos de usuario</a>
        <div>
           <button>ENVIAR</button>
        </div>
    </div>
    </form>
   <footer>
    <p>Author: <a href="https://github.com/Morreinm">Morreinm</a></p>
   </footer>
    
</body>

</html>
